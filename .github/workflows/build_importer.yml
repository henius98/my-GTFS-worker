name: Build Importer

on:
  push:
    branches:
      - main
    paths:
      - "importer/**"
      - "migrations/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain"
      - ".github/workflows/build_importer.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_OPTIONS: "--no-deprecation"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed for creating a GitHub release

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust Dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build Importer
        run: cargo build --release -p importer

      - name: Publish to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create a rolling 'latest-cron' tag and release
          # Using gh cli which is pre-installed on ubuntu runners

          # Delete the release and tag if they exist locally and remotely
          if gh release view latest-cron >/dev/null 2>&1; then
            gh release delete latest-cron -y --cleanup-tag
          fi

          # Create the release and upload the binary
          gh release create latest-cron target/release/importer \
            --title "Latest Importer Build" \
            --notes "Automated build from commit ${{ github.sha }} for the cron pipeline." \
            --latest
