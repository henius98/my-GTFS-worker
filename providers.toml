# providers.toml — Single source of truth for all GTFS provider instances.
#
# After adding a new provider block with an empty `database_id`:
#   1. Run: ./deploy.sh
#
# The deploy script will automatically provision the D1 database, 
# fill in the `database_id`, generate wrangler.toml, and deploy!

